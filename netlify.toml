[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# App JS files — must NOT be cached (change frequently)
[[headers]]
  for = "/assets/app.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Immutable only for vendor libs that NEVER change
[[headers]]
  for = "/assets/react.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/reactdom.min.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — never cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/app"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
