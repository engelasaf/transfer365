<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Transfer365 — Loading</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
<style>
body{margin:0;font-family:system-ui,sans-serif;background:#0D1A0D;color:#fff;min-height:100vh}
.step{padding:12px 20px;margin:8px;border-radius:8px;font-size:14px}
.ok{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#22C55E}
.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#F87171}
.info{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#A5B4FC}
#t365bar{position:fixed;top:0;right:0;z-index:9999;display:flex;align-items:center;gap:8px;
  padding:6px 14px;background:rgba(17,24,39,.95);border-bottom-left-radius:10px;font-size:12px}
#t365bar span{color:#fff;font-weight:600}
#t365bar a{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.65);font-size:11px;text-decoration:none;cursor:pointer}
</style>
</head>
<body>
<script>
/* Auth guard */
(function(){
  var s=localStorage.getItem('t365_session');
  if(!s){window.location.replace('/');return;}
  try{window._T365=JSON.parse(s);}catch(e){window._T365={};}
})();
</script>

<div id="t365bar">
  <span id="t365name">Agent</span>
  <a href="/" onclick="localStorage.removeItem('t365_session')">Log out</a>
</div>

<div id="root" style="padding:60px 20px;max-width:600px;margin:0 auto">
  <div class="step info">⏳ בודק React...</div>
</div>

<script>
/* Step-by-step diagnostic */
var root = document.getElementById('root');

function log(msg, type) {
  var div = document.createElement('div');
  div.className = 'step ' + (type||'info');
  div.textContent = msg;
  root.appendChild(div);
}

// Catch all errors
window.onerror = function(msg, src, line, col, err) {
  log('❌ Window Error: ' + msg + ' (' + (src||'').split('/').pop() + ':' + line + ')', 'err');
};
window.addEventListener('unhandledrejection', function(e) {
  log('❌ Unhandled Promise: ' + (e.reason||'unknown'), 'err');
});

// 1. Check React
root.innerHTML = '';
if (typeof React !== 'undefined') {
  log('✅ React ' + (React.version||'?') + ' loaded', 'ok');
} else {
  log('❌ React NOT loaded — CDN failed', 'err');
}

// 2. Check ReactDOM
if (typeof ReactDOM !== 'undefined') {
  log('✅ ReactDOM loaded', 'ok');
} else {
  log('❌ ReactDOM NOT loaded — CDN failed', 'err');
}

// 3. Check Recharts
if (typeof Recharts !== 'undefined') {
  log('✅ Recharts loaded (' + Object.keys(Recharts).length + ' exports)', 'ok');
} else {
  log('⚠️ Recharts NOT loaded', 'err');
}

// 4. Test React render
try {
  var testEl = document.createElement('div');
  root.appendChild(testEl);
  var testRoot = ReactDOM.createRoot(testEl);
  testRoot.render(React.createElement('span', {style:{color:'#22C55E'}}, '✅ React renders OK'));
  log('✅ ReactDOM.createRoot works', 'ok');
} catch(e) {
  log('❌ React render test failed: ' + e.message, 'err');
}

// 5. Session info
var u = window._T365||{};
log('✅ Session: ' + (u.email||'unknown'), 'ok');

// 6. Load full app
log('⏳ Loading full dashboard...', 'info');

// Set username
var nameEl = document.getElementById('t365name');
if (nameEl) nameEl.textContent = (u.full_name||(u.email||'').split('@')[0]||'Agent');
</script>

<script>
/* Load compiled app after diagnostics */
(function() {
  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
    document.getElementById('root').innerHTML += '<div class="step err">❌ Cannot load app — React CDN failed</div>';
    return;
  }

  var root = document.getElementById('root');

  try {
    var _RC = (typeof Recharts !== 'undefined' ? Recharts : {});
    var BarChart = _RC.BarChart, Bar = _RC.Bar, XAxis = _RC.XAxis, YAxis = _RC.YAxis,
        Tooltip = _RC.Tooltip, ResponsiveContainer = _RC.ResponsiveContainer,
        AreaChart = _RC.AreaChart, Area = _RC.Area, LineChart = _RC.LineChart, Line = _RC.Line;

    var useState = React.useState, useEffect = React.useEffect;

    /* ── Minimal working App ── */
    function App() {
      var _useState = useState('dash');
      var pg = _useState[0], setPg = _useState[1];

      return React.createElement('div', {
        style: {
          display: 'flex', minHeight: '100vh', fontFamily: 'system-ui,sans-serif',
          background: '#f1f3f5', direction: 'rtl'
        }
      },
        /* Sidebar */
        React.createElement('div', {style:{width:160,background:'#111827',padding:'16px 0',flexShrink:0}},
          React.createElement('div', {style:{padding:'12px 16px',color:'#fff',fontSize:13,fontWeight:700,marginBottom:8}},
            '⚡ Transfer365'
          ),
          ['דשבורד','פורטפוליו','מאצ'ים','CRM','ניתוח'].map(function(label, i) {
            var ids = ['dash','port','mch','pipe','anl'];
            return React.createElement('button', {
              key: i,
              onClick: function(){setPg(ids[i]);},
              style: {
                width:'100%', padding:'9px 16px', background: pg===ids[i]?'rgba(83,74,183,.3)':'transparent',
                border:'none', borderRight: pg===ids[i]?'2px solid #534AB7':'2px solid transparent',
                color: pg===ids[i]?'#fff':'rgba(255,255,255,.5)', cursor:'pointer',
                textAlign:'right', fontSize:12
              }
            }, label);
          })
        ),
        /* Main */
        React.createElement('div', {style:{flex:1,padding:20}},
          React.createElement('h2', {style:{color:'#1a1a2e',margin:'0 0 16px'}}, pg),
          React.createElement('div', {
            style:{background:'#fff',borderRadius:12,padding:20,border:'0.5px solid #dee2e6'}
          },
            React.createElement('p', {style:{color:'#22C55E',fontWeight:700,fontSize:16}},
              '✅ האפליקציה עובדת! הדשבורד נטען בהצלחה.'
            ),
            React.createElement('p', {style:{color:'#666',marginTop:8}},
              'הדשבורד המלא נבנה בנפרד ויוטען כאן.'
            )
          )
        )
      );
    }

    root.innerHTML = '';
    ReactDOM.createRoot(root).render(React.createElement(App, null));

  } catch(e) {
    root.innerHTML += '<div class="step err">❌ App Error: ' + e.message + '<br><pre style="font-size:10px;margin-top:8px">' + e.stack + '</pre></div>';
    console.error('App error:', e);
  }
})();
</script>
</body>
</html>
