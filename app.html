<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Transfer365</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;direction:rtl}
input,button{font-family:inherit;outline:none}
:root{
  --bg1:#ffffff;--bg2:#f8f9fa;--bg3:#f1f3f5;
  --tx1:#1a1a2e;--tx2:#495057;--tx3:#868e96;
  --bd2:#dee2e6;--bd3:#e9ecef;
}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(2.4)}100%{transform:scale(1)}}

#t365bar{position:fixed;top:0;right:0;z-index:9999;display:flex;align-items:center;
  gap:8px;padding:6px 14px;background:rgba(17,24,39,.95);border-bottom-left-radius:10px;
  font-family:system-ui,sans-serif;font-size:12px}
#t365bar span{color:#fff;font-weight:600}
#t365bar a{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.65);font-size:11px;text-decoration:none}
#t365-err{display:none;position:fixed;inset:0;padding:40px;font-family:sans-serif;
  background:#1a1a2e;color:#fff;overflow:auto;z-index:9998;direction:ltr}
#t365-err h2{color:#EF4444}
#t365-err pre{background:rgba(255,255,255,.05);padding:16px;border-radius:8px;
  font-size:11px;white-space:pre-wrap;overflow:auto;margin-top:12px}
</style>
</head>
<body style="margin:0">

<!-- Auth guard: runs before any heavy scripts -->
<script>
(function(){
  try {
    var s = localStorage.getItem('t365_session');
    if (!s) { window.location.replace('/'); return; }
    window._T365 = JSON.parse(s);
  } catch(e) {
    window.location.replace('/');
  }
})();
</script>

<!-- Logout bar -->
<div id="t365bar">
  <span id="t365name">Agent</span>
  <a href="/" onclick="localStorage.removeItem('t365_session')">Log out</a>
</div>

<!-- Error display (shown if app crashes) -->
<div id="t365-err">
  <h2>&#10060; App Error</h2>
  <pre id="t365-err-msg"></pre>
  <p><a href="/" style="color:#AFA9EC">&#8592; Back to home</a></p>
</div>

<!-- Root element -->
<div id="root"></div>

<!-- Load libraries as external files (avoids </script> parsing issues) -->
<script src="/assets/react.min.js"></script>
<script src="/assets/reactdom.min.js"></script>
<script src="/assets/recharts.min.js"></script>
<script src="/assets/app.js"></script>

<!-- Mount: tiny inline script, no risk of parsing issues -->
<script>
(function(){
  // Set username
  var u = window._T365 || {};
  var el = document.getElementById('t365name');
  if (el) el.textContent = u.full_name || (u.email||'').split('@')[0] || 'Agent';

  var root = document.getElementById('root');
  var errBox = document.getElementById('t365-err');
  var errMsg = document.getElementById('t365-err-msg');

  function showErr(e) {
    if (errBox) errBox.style.display = 'block';
    if (errMsg) errMsg.textContent = (e && e.stack) ? e.stack : String(e);
    if (root) root.style.display = 'none';
  }

  if (typeof React === 'undefined') { showErr(new Error('React failed to load from /assets/react.min.js')); return; }
  if (typeof ReactDOM === 'undefined') { showErr(new Error('ReactDOM failed to load')); return; }
  if (typeof App === 'undefined') { showErr(new Error('App component not defined — /assets/app.js failed to load')); return; }

  try {
    ReactDOM.createRoot(root).render(React.createElement(App, null));
  } catch(e) {
    showErr(e);
  }
})();
</script>

</body>
</html>
