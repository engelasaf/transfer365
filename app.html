            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <Pill l={st} bg={SBG[si]} tc={STC[si]}/>
              <span style={{fontSize:10,color:"var(--tx3)",background:"var(--bg2)",padding:"1px 7px",borderRadius:8}}>{byS(si).length}</span>
            </div>
            <span style={{fontSize:9,color:"var(--tx3)",fontVariantNumeric:"tabular-nums"}}>{fmt(byS(si).reduce((s,d)=>s+d.comm,0))}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {byS(si).map(d=><div key={d.id} style={{background:"var(--bg1)",border:"0.5px solid var(--bd3)",borderRadius:10,padding:"10px 12px"}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
                <div style={{width:24,height:24,borderRadius:"50%",background:d.bg||BB,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:d.tc||B,flexShrink:0}}>{d.p.split(" ").slice(0,2).map(w=>w[0]).join("")}</div>
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:11,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--tx1)"}}>{d.p}</div><div style={{fontSize:9,color:"var(--tx3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.fr} → {d.to}</div></div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:11,fontWeight:700,color:"#27500A",fontVariantNumeric:"tabular-nums"}}>{fmt(d.comm)}</span>
                <span style={{fontSize:9,color:"var(--tx3)"}}>{d.din} ימים</span>
              </div>
              <div style={{display:"flex",gap:4}}>
                {si>0&&<button onClick={()=>mv(d.id,-1)} style={{flex:1,padding:"3px",borderRadius:5,border:"0.5px solid var(--bd2)",background:"transparent",color:"var(--tx3)",cursor:"pointer",fontSize:10}}>← חזור</button>}
                {si<4&&<button onClick={()=>mv(d.id,1)} style={{flex:1,padding:"3px",borderRadius:5,border:"0.5px solid "+B,background:BB,color:B,cursor:"pointer",fontSize:10}}>{si===3?"✓ סגור":"הקדם →"}</button>}
              </div>
            </div>)}
            {byS(si).length===0&&<div style={{border:"0.5px dashed var(--bd2)",borderRadius:10,padding:"16px",textAlign:"center",fontSize:11,color:"var(--tx3)"}}>אין עסקאות</div>}
          </div>
        </div>)}
      </div>
    </div>;
  }

  function Budget(){
    const tot=BUDG.reduce((s,t)=>s+t.b,0),used=BUDG.reduce((s,t)=>s+t.u,0);
    return <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        <Stat l="תקציב כולל" v={"€"+(tot/1000).toFixed(1)+"M"} s=""/>
        <Stat l="בשימוש" v={"€"+(used/1000).toFixed(1)+"M"} s="" bg="#FCEBEB" c="#A32D2D"/>
        <Stat l="זמין" v={"€"+((tot-used)/1000).toFixed(1)+"M"} s="" bg="#EAF3DE" c="#27500A"/>
      </div>
      <Card>
        <CardH title="תקציב vs שימוש"/>
        <div style={{padding:"12px 14px"}}>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={BUDG} margin={{top:0,right:0,left:0,bottom:44}}>
              <XAxis dataKey="t" tick={{fontSize:9,fill:"var(--tx3)"}} angle={-35} textAnchor="end" interval={0}/>
              <YAxis tick={{fontSize:10,fill:"var(--tx3)"}} tickFormatter={v=>"€"+v+"K"}/>
              <Tooltip formatter={v=>["€"+v+"K"]} contentStyle={{fontSize:11,borderRadius:8,border:"0.5px solid var(--bd2)",background:"var(--bg1)"}}/>
              <Bar dataKey="b" name="תקציב" fill="#E1F5EE" radius={[3,3,0,0]}/><Bar dataKey="u" name="בשימוש" fill={B} radius={[3,3,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </Card>
      <Card>
        <CardH title="אחוז ניצול"/>
        {BUDG.map((t,i)=>{const p=Math.round(t.u/t.b*100),bc=p>85?"#E24B4A":p>65?"#EF9F27":"#1D9E75";return <div key={i} style={{padding:"9px 14px",borderTop:i>0?"0.5px solid var(--bd3)":"none"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,fontWeight:700,color:"var(--tx1)"}}>{t.t}</span><span style={{fontSize:11,color:"var(--tx3)",fontVariantNumeric:"tabular-nums"}}>€{t.u}K / €{t.b}K · <span style={{color:bc,fontWeight:700}}>{p}%</span></span></div>
          <div style={{height:5,background:"var(--bg2)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:p+"%",background:bc,borderRadius:3}}/></div>
        </div>;})}
      </Card>
    </div>;
  }

  function Calendar(){
    return <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:PIT,borderRadius:12,padding:20,textAlign:"center"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginBottom:10,textTransform:"uppercase",letterSpacing:".08em"}}>חלון ההעברות נסגר בעוד</div>
        <div style={{display:"flex",justifyContent:"center",gap:20}}>
          {[{v:wD,l:"ימים"},{v:wH,l:"שעות"},{v:wM,l:"דקות"},{v:wS,l:"שניות"}].map((u,i)=><div key={i} style={{textAlign:"center"}}>
            <div style={{fontSize:34,fontWeight:700,color:"#22C55E",fontVariantNumeric:"tabular-nums",minWidth:46}}>{pad(u.v)}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.35)",marginTop:2}}>{u.l}</div>
          </div>)}
        </div>
        <div style={{height:4,background:"rgba(255,255,255,.1)",borderRadius:2,marginTop:14,overflow:"hidden"}}><div style={{height:"100%",width:Math.max(2,(secs/(90*86400))*100).toFixed(1)+"%",background:"#22C55E",borderRadius:2}}/></div>
      </div>
      <Card>
        <CardH title="ציר זמן — חוזים וחלונות"/>
        <div style={{padding:"0 14px 12px"}}>
          {[{d:"11.06.25",l:"נועם שפירא — חוזה פג",bg:"#EAF3DE",tc:"#27500A"},{d:"19.06.25",l:"עמיר כץ + בן לוי",bg:"#FCEBEB",tc:"#A32D2D"},{d:"23.06.25",l:"מרקוס סילבה",bg:"#FCEBEB",tc:"#A32D2D"},{d:"01.07.25",l:"חלון קיץ נפתח",bg:"#E1F5EE",tc:"#085041"},{d:"15.08.25",l:"לוקאס פריירה",bg:"#FAEEDA",tc:"#633806"},{d:"31.08.25",l:"חלון קיץ נסגר",bg:"#FCEBEB",tc:"#A32D2D"}].map((e,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 0",borderTop:i>0?"0.5px solid var(--bd3)":"none"}}>
            <Pill l={e.d} bg={e.bg} tc={e.tc} s={{minWidth:64,textAlign:"center",fontVariantNumeric:"tabular-nums"}}/>
            <div style={{fontSize:12,fontWeight:700,color:"var(--tx1)"}}>{e.l}</div>
          </div>)}
        </div>
      </Card>
    </div>;
  }

  function Analytics(){
    const totC2=COMM_H.reduce((s,m)=>s+m.c,0);
    return <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:8}}>
        <Stat l="עסקאות סגורות" v="7" s="2024/25"/><Stat l="סה״כ עמלות" v={fmt(totC2)} s="" bg={BB} c={B}/><Stat l="שיעור הצלחה" v="68%" s="" bg="#EAF3DE" c="#27500A"/><Stat l="ממוצע לעסקה" v={fmt(Math.round(totC2/7))} s="" bg="#FAEEDA" c="#633806"/>
      </div>
      <Card>
        <CardH title="עמלות חודשיות — 2025"/>
        <div style={{padding:"12px 14px"}}>
          <ResponsiveContainer width="100%" height={160}>
            <AreaChart data={COMM_H}>
              <XAxis dataKey="m" tick={{fontSize:10,fill:"var(--tx3)"}}/><YAxis tick={{fontSize:10,fill:"var(--tx3)"}} tickFormatter={v=>"€"+v/1000+"K"}/>
              <Tooltip formatter={v=>["€"+Number(v).toLocaleString(),"עמלה"]} contentStyle={{fontSize:11,borderRadius:8,border:"0.5px solid var(--bd2)",background:"var(--bg1)"}}/>
              <Area type="monotone" dataKey="c" stroke={B} fill={BB} strokeWidth={2}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Card style={{padding:"12px 14px"}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>שחקנים לפי סטטוס</div>
          {[{l:"תפוסים",n:ownPl.filter(p=>p.st==="active").length,c:"#27500A"},{l:"מתפנים",n:ownPl.filter(p=>p.days<=30&&p.st!=="free").length,c:"#633806"},{l:"פציעה",n:ownPl.filter(p=>p.st==="injury").length,c:"#A32D2D"},{l:"חופשיים",n:ownPl.filter(p=>p.st==="free").length,c:"#27500A"},{l:"בקשת העברה",n:ownPl.filter(p=>p.st==="transfer_req").length,c:B}].map((s,i)=>
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderTop:i>0?"0.5px solid var(--bd3)":"none"}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:s.c,flexShrink:0}}/><span style={{flex:1,fontSize:12,color:"var(--tx1)"}}>{s.l}</span><span style={{fontSize:13,fontWeight:700,color:s.c,fontVariantNumeric:"tabular-nums"}}>{s.n}</span>
            </div>
          )}
        </Card>
        <Card style={{padding:"12px 14px"}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>מגמת שוק</div>
          <ResponsiveContainer width="100%" height={140}>
            <LineChart data={TREND}>
              <XAxis dataKey="m" tick={{fontSize:10,fill:"var(--tx3)"}}/><YAxis tick={{fontSize:10,fill:"var(--tx3)"}} tickFormatter={v=>"€"+v+"K"}/>
              <Tooltip formatter={v=>["€"+v+"K","ממוצע"]} contentStyle={{fontSize:11,borderRadius:8,border:"0.5px solid var(--bd2)",background:"var(--bg1)"}}/>
              <Line type="monotone" dataKey="v" stroke={B} strokeWidth={2} dot={{r:3,fill:B}}/>
            </LineChart>
          </ResponsiveContainer>
        </Card>
      </div>
    </div>;
  }

  function Network(){
    const ag=[{n:"יוסי כהן",s:"ליגת העל · בלמים",m:3,av:"י.כ",bg:BB,tc:B},{n:"מרגלית לוי",s:"ליגה א׳ · חלוצים",m:1,av:"מ.ל",bg:"#E1F5EE",tc:"#085041"},{n:"דוד ברוך",s:"ספרד · EU",m:5,av:"ד.ב",bg:"#FAECE7",tc:"#712B13"},{n:"נעמי שרון",s:"טורקיה · קשרים",m:2,av:"נ.ש",bg:"#FAEEDA",tc:"#633806"},{n:"אמיר גבאי",s:"שוערים",m:4,av:"א.ג",bg:"#E6F1FB",tc:"#0C447C"}];
    return <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        <Stat l="קשרים" v="23" s=""/><Stat l="בקשות" v="4" s="" bg={BB} c={B}/><Stat l="שיתופי פעולה" v="7" s="" bg="#EAF3DE" c="#27500A"/>
      </div>
      <Card>
        <CardH title="סוכנים מומלצים"/>
        <div style={{padding:"0 14px 10px"}}>
          {ag.map((a,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderTop:i>0?"0.5px solid var(--bd3)":"none"}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:a.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:a.tc,flexShrink:0}}>{a.av}</div>
            <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:"var(--tx1)"}}>{a.n}</div><div style={{fontSize:10,color:"var(--tx3)"}}>{a.s} · {a.m} קשרים משותפים</div></div>
            <W id={"n"+i}/>
            <button style={{fontSize:11,padding:"4px 12px",borderRadius:8,border:"0.5px solid "+B,background:"transparent",color:B,cursor:"pointer"}}>התחבר</button>
          </div>)}
        </div>
      </Card>
    </div>;
  }

  function Settings(){
    return <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div><div style={{fontSize:13,fontWeight:700}}>ניהול התראות</div><div style={{fontSize:11,color:"var(--tx3)",marginTop:2}}>כ-<span style={{fontSize:18,fontWeight:700,color:B,fontVariantNumeric:"tabular-nums"}}>{wkly}</span> התראות בשבוע</div></div>
        <button style={{fontSize:11,padding:"7px 16px",borderRadius:8,border:"none",background:B,color:"#EEEDFE",cursor:"pointer",fontWeight:700}}>שמור הגדרות</button>
      </div>
      {trigs.map((cat,ci)=><Card key={ci} style={{overflow:"hidden",marginBottom:8}}>
        <div style={{padding:"8px 14px",background:"var(--bg2)",borderBottom:"0.5px solid var(--bd3)",fontSize:10,fontWeight:700,color:"var(--tx3)",textTransform:"uppercase",letterSpacing:".07em",display:"flex",justifyContent:"space-between"}}>
          {cat.lb}<span style={{color:B}}>{cat.its.filter(t=>t.on).length}/{cat.its.length} פעיל</span>
        </div>
        {cat.its.map((it,ii)=><div key={ii} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",borderTop:ii>0?"0.5px solid var(--bd3)":"none",cursor:"pointer"}} onClick={()=>setTrigs(p=>p.map((c,x)=>x!==ci?c:{...c,its:c.its.map((t,y)=>y!==ii?t:{...t,on:!t.on})}))}>
          <i className={"ti "+it.ic} style={{fontSize:15,color:it.on?B:"var(--tx3)",flexShrink:0}}/>
          <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:"var(--tx1)"}}>{it.n}</div><div style={{fontSize:10,color:"var(--tx3)",marginTop:1}}>~{it.w} /שבוע · {it.id}</div></div>
          <div style={{width:36,height:20,borderRadius:10,background:it.on?BL:"var(--bd2)",position:"relative",transition:"background .2s",flexShrink:0}}>
            <div style={{position:"absolute",top:2,left:it.on?18:2,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"left .2s"}}/>
          </div>
        </div>)}
      </Card>)}
    </div>;
  }

  const PAGES={dash:<Dash/>,port:<Portfolio/>,disc:<Discover/>,mch:<Matches/>,pipe:<Pipeline/>,budg:<Budget/>,cal:<Calendar/>,anl:<Analytics/>,net:<Network/>,set:<Settings/>};

  return <div dir="rtl" style={{display:"flex",flexDirection:"column",fontFamily:"system-ui,-apple-system,sans-serif",background:"var(--bg3)",minHeight:"100vh"}}>
    <PlayerModal/>
    <div style={{background:PIT,padding:"6px 16px",display:"flex",alignItems:"center",gap:10,overflow:"hidden",flexShrink:0}}>
      <span style={{width:6,height:6,borderRadius:"50%",background:"#22C55E",flexShrink:0}}/>
      <span style={{fontSize:10,fontWeight:700,color:"#22C55E",letterSpacing:".08em",flexShrink:0}}>LIVE</span>
      <span style={{width:1,height:12,background:"rgba(255,255,255,.15)",flexShrink:0}}/>
      <span style={{fontSize:11,color:"rgba(255,255,255,.75)",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",flex:1}}>{TICKER[ti]}</span>
      {unread>0&&<Pill l={unread+" חדש"} bg="#E24B4A" tc="#fff" s={{flexShrink:0}}/>}
    </div>
    <div style={{display:"flex",flex:1,minHeight:0}}>
      <div style={{width:154,background:"#111827",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"12px 14px 8px",borderBottom:"0.5px solid rgba(255,255,255,.08)"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#fff",display:"flex",alignItems:"center",gap:6}}>
            <i className="ti ti-transfer" style={{fontSize:15,color:BL}}/>TransferPlan
          </div>
          <div style={{fontSize:9,color:"rgba(255,255,255,.3)",marginTop:3}}>אדם כהן · פרימיום</div>
        </div>
        <nav style={{flex:1,padding:"5px 0",overflowY:"auto"}}>
          {NAV.map(n=><button key={n.id} onClick={()=>setPg(n.id)} style={{width:"100%",padding:"8px 14px",display:"flex",alignItems:"center",gap:8,background:pg===n.id?"rgba(83,74,183,.3)":"transparent",border:"none",borderRight:pg===n.id?"2px solid "+BL:"2px solid transparent",cursor:"pointer",transition:"background .15s"}}>
            <i className={"ti "+n.ic} style={{fontSize:14,color:pg===n.id?"#AFA9EC":"rgba(255,255,255,.4)",flexShrink:0}}/>
            <span style={{fontSize:11,color:pg===n.id?"#fff":"rgba(255,255,255,.45)",fontWeight:pg===n.id?700:400}}>{n.l}</span>
            {n.id==="set"&&unread>0&&<span style={{marginRight:"auto",width:15,height:15,borderRadius:"50%",background:"#E24B4A",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:700}}>{unread}</span>}
          </button>)}
        </nav>
        <div style={{padding:"10px 14px",borderTop:"0.5px solid rgba(255,255,255,.08)"}}>
          <div style={{fontSize:9,color:"rgba(255,255,255,.3)",marginBottom:3}}>חלון נסגר</div>
          <div style={{fontSize:13,fontWeight:700,color:"#22C55E",fontVariantNumeric:"tabular-nums"}}>{wD}י {pad(wH)}:{pad(wM)}</div>
          <div style={{height:3,background:"rgba(255,255,255,.1)",borderRadius:2,marginTop:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:Math.max(2,(secs/(90*86400))*100).toFixed(1)+"%",background:"#22C55E",borderRadius:2}}/>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflow:"auto",padding:14,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <h1 style={{fontSize:15,fontWeight:700,color:"var(--tx1)",margin:0}}>{(NAV.find(n=>n.id===pg)||{l:""}).l}</h1>
          {pg==="port"&&<Pill l={ownPl.length+" שחקנים"} bg={BB} tc={B}/>}
          {pg==="mch"&&<Pill l={MATCHES.length+" מאצ׳ים"} bg="#EAF3DE" tc="#27500A"/>}
          {pg==="pipe"&&<Pill l={fmt(totC)+" בצנרת"} bg="#EAF3DE" tc="#27500A"/>}
          {pg==="set"&&<Pill l={wkly+" /שבוע"} bg={BB} tc={B}/>}
        </div>
        {PAGES[pg]||PAGES.dash}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<style>
#t365-topbar{position:fixed;top:0;right:0;z-index:9999;display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(17,24,39,.95);border-bottom-left-radius:10px;font-family:system-ui,sans-serif;font-size:12px;color:rgba(255,255,255,.6)}
#t365-topbar span{color:rgba(255,255,255,.9);font-weight:600}
#t365-topbar button{padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.6);cursor:pointer;font-size:11px}
#t365-topbar button:hover{background:rgba(255,255,255,.1);color:#fff}
</style>
<div id="t365-topbar">
  <span id="t365-user">Agent</span>
  <button onclick="localStorage.removeItem('t365_session');window.location.href='/'">Log out</button>
</div>
<script>
var u = window._T365 || {};
var name = u.full_name || (u.email||'').split('@')[0] || 'Agent';
document.getElementById('t365-user').textContent = name;

document.addEventListener('DOMContentLoaded',function(){
  document.body.style.paddingTop = '40px';
});
</script>

</body>
