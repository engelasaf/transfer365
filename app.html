<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Transfer365 App</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>


*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;direction:rtl}
input,button{font-family:inherit;outline:none}
:root{
  --bg1:#ffffff;--bg2:#f8f9fa;--bg3:#f1f3f5;
  --tx1:#1a1a2e;--tx2:#495057;--tx3:#868e96;
  --bd2:#dee2e6;--bd3:#e9ecef;
}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(2.4)}100%{transform:scale(1)}}

#t365bar{position:fixed;top:0;right:0;z-index:9999;display:flex;align-items:center;
  gap:8px;padding:6px 14px;background:rgba(17,24,39,.95);border-bottom-left-radius:10px;
  font-family:system-ui,sans-serif;font-size:12px}
#t365bar span{color:#fff;font-weight:600}
#t365bar a{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.65);font-size:11px;text-decoration:none}
#t365-err{display:none;position:fixed;inset:0;padding:40px;font-family:sans-serif;
  background:#1a1a2e;color:#fff;overflow:auto;z-index:9998;direction:ltr}
#t365-err h2{color:#EF4444}
#t365-err pre{background:rgba(255,255,255,.05);padding:16px;border-radius:8px;
  font-size:11px;white-space:pre-wrap;overflow:auto;margin-top:12px}

body{margin:0}
#t365bar{position:fixed;top:0;right:0;z-index:9999;display:flex;align-items:center;
  gap:8px;padding:6px 14px;background:rgba(17,24,39,.95);border-bottom-left-radius:10px;
  font-family:system-ui,sans-serif;font-size:12px}
#t365bar span{color:#fff;font-weight:600}
#t365bar a{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.65);font-size:11px;text-decoration:none}
#qa-err{position:fixed;inset:0;background:#1a1a2e;color:#fff;padding:32px;
  font-family:monospace;font-size:13px;overflow:auto;z-index:99999;direction:ltr;
  display:none}
#qa-err h2{color:#f87171;margin-bottom:16px;font-size:18px}
#qa-err pre{background:rgba(255,255,255,.06);padding:16px;border-radius:8px;
  white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>

<!-- Step 0: catch everything before any script runs -->
<script>
window._qa = [];
function qaStep(m){ console.log("[qa]",m); }
function qaErr(msg,detail){
  var box=document.getElementById('qa-err');
  var pre=document.getElementById('qa-err-pre');
  if(box){ box.style.display='block'; }
  if(pre){ pre.textContent = msg + (detail ? '\n\n' + detail : ''); }
  var steps=document.getElementById('qa-steps');
  if(steps){ steps.style.color='#fca5a5'; steps.textContent='ERROR at: '+window._qa.join(' → ')+' | '+msg; }
  console.error('[qa-err]', msg, detail);
}
window.onerror = function(msg,src,line,col,err){
  qaErr('window.onerror: '+msg+' at '+src+':'+line, err ? err.stack : '');
  return false;
};
window.addEventListener('unhandledrejection', function(e){
  qaErr('Unhandled Promise: '+(e.reason||'unknown'), e.reason && e.reason.stack);
});
qaStep('init');
</script>

<!-- Auth guard -->
<script>
qaStep('auth-check');
(function(){
  var s = null;
  try { s = localStorage.getItem('t365_session'); } catch(e){ qaErr('localStorage error',e.message); }
  if(!s){ window.location.replace('/'); return; }
  try { window._T365 = JSON.parse(s); } catch(e){ window._T365={}; }
  qaStep('auth-ok('+((window._T365&&window._T365.email)||'?')+')');
})();
</script>

<!-- Error display box (always in DOM) -->
<div id="qa-err">
  <h2>&#10060; App Error</h2>
  <pre id="qa-err-pre">Loading...</pre>
  <p style="margin-top:16px"><a href="/" style="color:#a5b4fc">&#8592; Back</a></p>
</div>

<!-- Logout bar -->
<div id="t365bar">
  <span id="t365name">...</span>
  <a href="/" onclick="localStorage.removeItem('t365_session')">Log out</a>
</div>
<script>
(function(){var u=window._T365||{};document.getElementById('t365name').textContent=(u.full_name||(u.email||'').split('@')[0]||'Agent');})();
</script>

<!-- Debug steps overlay -->

<!-- Root -->
<div id="root" style="min-height:100vh"></div>

<!-- Load React -->
<script src="/assets/react.min.js?v=202606171220"></script>
<script>
qaStep('react='+(typeof React));
if(typeof React==='undefined') qaErr('React failed to load','Check /assets/react.min.js');
</script>

<!-- Load ReactDOM -->
<script src="/assets/reactdom.min.js?v=202606171220"></script>
<script>
qaStep('reactdom='+(typeof ReactDOM));
if(typeof ReactDOM==='undefined') qaErr('ReactDOM failed to load','Check /assets/reactdom.min.js');
</script>

<!-- Load Recharts -->
<script>
</script>

<!-- Load App -->
<script src="/assets/app.js?v=202607150807"></script>
<script>
qaStep('App='+(typeof App));
if(typeof App==='undefined') qaErr('App function not defined after loading app.js','The file loaded but App was not exported to global scope');
</script>

<!-- Mount -->
<script>
qaStep('mounting');
(function(){
  if(typeof React==='undefined'||typeof ReactDOM==='undefined'||typeof App==='undefined'){
    qaErr('Cannot mount: missing dependency','React='+typeof React+' ReactDOM='+typeof ReactDOM+' App='+typeof App);
    return;
  }
  var root = document.getElementById('root');
  try {
    qaStep('createRoot');
    var r = ReactDOM.createRoot(root);
    qaStep('render');
    r.render(React.createElement(App, null));
    qaStep('render-called');
    // Remove debug overlay after 3s if render succeeded
    setTimeout(function(){
      var s=document.getElementById('qa-steps');
      if(s && s.style.color !== '#fca5a5') s.style.display='none';
    }, 3000);
  } catch(e) {
    qaErr('React render threw: '+e.message, e.stack);
  }
})();
</script>

</body>
</html>
