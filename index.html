async function translateStrings(langName) {
  const prompt = `Translate ALL JSON values to ${langName}. Return ONLY valid JSON (no markdown, no explanation).
Rules: keep these UNTRANSLATED: xG, xA, GBE, ETV, FFAR, CRM, AI, FIFA, UEFA, PL, RTL, xTV, PSxG. Keep numbers, currency signs, player/club names unchanged. Natural phrasing for ${langName}.
${JSON.stringify(BASE)}`;
  const resp = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  });
  const data = await resp.json();
  const raw = data.content?.[0]?.text || "{}";
  const clean = raw.replace(/```json|```/g,"").trim();
  const match = clean.match(/\{[\s\S]*\}/);
  if(!match) throw new Error("No JSON in response");
  return JSON.parse(match[0]);
}

function computeFit(p, need){
  let style=50;
  if(p.pos===need.posTarget) style=94;
  else if(["CB","FB"].includes(p.pos)&&["CB","FB"].includes(need.posTarget)) style=78;
  const ap=p.pctl.reduce((a,b)=>a+b[1],0)/p.pctl.length;
  style=Math.min(98,Math.round(style*.6+ap*.4));
  let gap=need.priority==="Urgent"?95:need.priority==="High"?82:68;
  if(need.fit?.includes(p.id)) gap=Math.min(98,gap+6);
  let budget=p.status==="free"?96:p.vMid<=need.budget*.7?92:p.vMid<=need.budget?80:p.vMid<=need.budget*1.25?58:34;
  const elig=p.gbe==="auto"||p.gbe==="pass"?96:40;
  return {overall:Math.round(style*.4+gap*.25+budget*.2+elig*.15),style,gap,budget,elig};
}

        <style>{`input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:${color};border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.22);cursor:pointer}input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:${color};border:2.5px solid #fff;cursor:pointer}`}</style>
      </div>;
    }
    return <div>
      {/* Search — gated for NL on free/starter */}
      <div onClick={()=>isAvail("nl_search")||gateClick("nl_search")} style={{display:"flex",alignItems:"center",background:"#fff",border:`1.5px solid ${isAvail("nl_search")?"#D8D7E6":"#D8D7E6"}`,borderRadius:13,padding:"10px 14px",marginBottom:10,gap:9,position:"relative"}}>
        <i className="ti ti-sparkles" style={{fontSize:18,color:isAvail("nl_search")?B:"#A9A7BC",flexShrink:0}}/>
        <input style={{flex:1,fontSize:13.5,border:"none",outline:"none",background:"none",cursor:isAvail("nl_search")?"text":"pointer"}} placeholder={isAvail("nl_search")?"Smart search: left-footed CB under 21, GBE-eligible, value under €40m…":"Natural-language search — Director plan"} value={isAvail("nl_search")?srch:""} onChange={e=>isAvail("nl_search")&&setSrch(e.target.value)} readOnly={!isAvail("nl_search")}/>
        {!isAvail("nl_search")&&<span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:7,background:"#EEEDFE",color:"#3C3489",display:"flex",alignItems:"center",gap:4,flexShrink:0,cursor:"pointer"}}><i className="ti ti-lock" style={{fontSize:11}}/>Director</span>}
        {isAvail("nl_search")&&srch&&<button onClick={()=>setSrch("")} style={{border:"none",background:"none",cursor:"pointer",color:"#A9A7BC",fontSize:15}}>✕</button>}
      </div>
      {/* Filter toggle bar */}
      <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
        <button onClick={()=>setShowFilters(v=>!v)} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 13px",borderRadius:9,border:`1.5px solid ${showFilters||activeFiltCount>0?B:"#D8D7E6"}`,background:showFilters?B:"#fff",color:showFilters?"#fff":"#3A3852",cursor:"pointer",fontWeight:600,fontSize:12}}>
          <i className={`ti ti-filter${activeFiltCount>0?"-filled":""}`} style={{fontSize:14}}/>Filters
          {activeFiltCount>0&&<span style={{background:showFilters?"rgba(255,255,255,.3)":B,color:"#fff",fontSize:10,fontWeight:700,padding:"0 6px",borderRadius:7,minWidth:18,textAlign:"center"}}>{activeFiltCount}</span>}
        </button>
        {activeFiltCount>0&&<button onClick={clearFilters} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 11px",borderRadius:9,border:"1px solid #D8D7E6",background:"#fff",color:"#E0453E",cursor:"pointer",fontSize:11.5,fontWeight:600}}>
          <i className="ti ti-x" style={{fontSize:13}}/>Clear all
        </button>}
        <div style={{display:"flex",gap:5,flexWrap:"wrap",flex:1}}>
          {posFilt.map(p=><Pill key={p} l={p} bg={posC[p]+"1a"} c={posC[p]}/>)}
          {footFilt!=="any"&&<Pill l={footFilt[0].toUpperCase()+footFilt.slice(1)+" foot"} bg="#F6F5FE" c={B}/>}
          {(vRange[0]>0||vRange[1]<130)&&<Pill l={`€${vRange[0]}–${vRange[1]}m`} bg={BLL} c={B}/>}
          {(ageRange[0]>16||ageRange[1]<35)&&<Pill l={`Age ${ageRange[0]}–${ageRange[1]}`} bg="#E4EDFB" c="#11366E"/>}
          {(htRange[0]>165||htRange[1]<200)&&<Pill l={`${htRange[0]}–${htRange[1]}cm`} bg="#EEEEF4" c="#6E6C84"/>}
          {leagueFilt!=="any"&&<Pill l={leagueFilt} bg="#FCEFD9" c="#6B3D03"/>}
          {natFilt&&<Pill l={natFilt} bg="#EEEEF4" c="#6E6C84"/>}
          {stFilt.map(s=><Pill key={s} l={stL[s]?.l||s} bg={stL[s]?.bg||"#EEEEF4"} c={stL[s]?.c||"#6E6C84"}/>)}
          {gbeOnly&&<Pill l="GBE ✓" bg="#E3F5EE" c="#06543A"/>}
          {euOnly&&<Pill l="🇪🇺 EU passport" bg="#E3F5EE" c="#06543A"/>}
        </div>
        <span style={{fontSize:11,color:"#A9A7BC",flexShrink:0,marginLeft:"auto"}}>{allP.length}/{PLAYERS.length} players</span>
      </div>
      {/* Filter panel */}
      {showFilters&&<div style={{background:"#fff",border:"1.5px solid #D8D7E6",borderRadius:14,padding:"18px 20px",marginBottom:12}}>
        {/* Row 1: dual range sliders */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:22,marginBottom:20}}>
          <div>
            <div style={{fontSize:10.5,fontWeight:700,color:"#3A3852",textTransform:"uppercase",letterSpacing:".05em",marginBottom:11,display:"flex",alignItems:"center",gap:5}}>
              <i className="ti ti-coins" style={{color:B,fontSize:13}}/>Value (€m)
            </div>
            <DR min={0} max={130} val={vRange} set={setVRange} fmt={v=>`€${v}m`} color="#3C3489"/>
          </div>
          <div>
            <div style={{fontSize:10.5,fontWeight:700,color:"#3A3852",textTransform:"uppercase",letterSpacing:".05em",marginBottom:11,display:"flex",alignItems:"center",gap:5}}>
              <i className="ti ti-calendar" style={{color:"#2563C9",fontSize:13}}/>Age
            </div>
            <DR min={16} max={38} val={ageRange} set={setAgeRange} fmt={v=>`${v}y`} color="#2563C9"/>
          </div>
          <div>
            <div style={{fontSize:10.5,fontWeight:700,color:"#3A3852",textTransform:"uppercase",letterSpacing:".05em",marginBottom:11,display:"flex",alignItems:"center",gap:5}}>
              <i className="ti ti-ruler" style={{color:"#7A5AF0",fontSize:13}}/>Height (cm)
            </div>
            <DR min={165} max={205} val={htRange} set={setHtRange} fmt={v=>`${v}`} color="#7A5AF0"/>
          </div>
        </div>
        <div style={{height:1,background:"#F1F0F8",margin:"0 -20px 18px"}}/>
        {/* Position multi-select */}
        <div style={{marginBottom:18}}>
          <div style={{fontSize:10.5,fontWeight:700,color:"#3A3852",textTransform:"uppercase",letterSpacing:".05em",marginBottom:9,display:"flex",alignItems:"center",gap:5}}>
            <i className="ti ti-layout-grid" style={{color:"#E8870C",fontSize:13}}/>Position
            {posFilt.length>0&&<span onClick={()=>setPosFilt([])} style={{fontSize:9.5,color:"#E0453E",cursor:"pointer",fontWeight:600,marginLeft:4,textTransform:"none"}}>clear</span>}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {ALL_POS.map(pos=>{const on=posFilt.includes(pos);const cnt=PLAYERS.filter(p=>p.pos===pos).length;return(
              <button key={pos} onClick={()=>toggleArr(posFilt,setPosFilt,pos)} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 13px",borderRadius:9,border:`1.5px solid ${on?posC[pos]:"#E7E6F0"}`,background:on?posC[pos]+"18":"#FAFAF9",color:on?posC[pos]:"#3A3852",cursor:"pointer",fontWeight:600,fontSize:12.5,transition:"all .13s"}}>
                {pos}<span style={{fontSize:9.5,opacity:.6,fontWeight:400}}>({cnt})</span>
              </button>
            );})}
          </div>
        </div>
        {/* Foot + League + Nationality in 3 cols */}
        <div style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr",gap:22,marginBottom:18,alignItems:"start"}}>
          <div>
            <div style={{fontSize:10.5,fontWeight:700,color:"#3A3852",textTransform:"uppercase",letterSpacing:".05em",marginBottom:9,display:"flex",alignItems:"center",gap:5}}>
              <i className="ti ti-shoe" style={{color:"#0E9F6E",fontSize:13}}/>Preferred foot
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {[["any","Any ⚽"],["right","Right ⚽"],["left","Left ⚽"],["both","Both (2-footed)"]].map(([v,l])=>(
                <button key={v} onClick={()=>setFootFilt(v)} style={{padding:"5px 12px",borderRadius:9,border:`1.5px solid ${footFilt===v?"#0E9F6E":"#E7E6F0"}`,background:footFilt===v?"#E3F5EE":"#FAFAF9",color:footFilt===v?"#06543A":"#3A3852",cursor:"pointer",fontSize:12,fontWeight:footFilt===v?700:400,textAlign:"left",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6}}>
                  {footFilt===v&&<i className="ti ti-check" style={{fontSize:12,color:"#0E9F6E"}}/>}{l}
                </button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:10.5,fontWeight:700,color:"#3A3852",textTransform:"uppercase",letterSpacing:".05em",marginBottom:9,display:"flex",alignItems:"center",gap:5}}>
              <i className="ti ti-flag" style={{color:"#E8870C",fontSize:13}}/>League
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {["any",...ALL_LG].map(l=>{const on=leagueFilt===l;return(
                <button key={l} onClick={()=>setLeagueFilt(l)} style={{padding:"5px 10px",borderRadius:9,border:`1.5px solid ${on?"#E8870C":"#E7E6F0"}`,background:on?"#FCEFD9":"#FAFAF9",color:on?"#6B3D03":"#3A3852",cursor:"pointer",fontSize:12,fontWeight:on?700:400}}>
                  {l==="any"?"All":l}
                </button>
              );})}
            </div>
            <div style={{marginTop:12}}>
              <div style={{fontSize:10.5,fontWeight:700,color:"#3A3852",textTransform:"uppercase",letterSpacing:".05em",marginBottom:7,display:"flex",alignItems:"center",gap:5}}>
                <i className="ti ti-world" style={{color:"#2563C9",fontSize:13}}/>Nationality / passport
              </div>
              <div style={{position:"relative"}}>
                <i className="ti ti-search" style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#A9A7BC"}}/>
                <input value={natFilt} onChange={e=>setNatFilt(e.target.value)} placeholder="e.g. Germany, Brazil, France…" style={{width:"100%",padding:"7px 10px 7px 30px",borderRadius:9,border:"1.5px solid #E7E6F0",outline:"none",fontSize:12,background:"#FAFAF9"}}/>
              </div>
            </div>
          </div>
          <div>
            <div style={{fontSize:10.5,fontWeight:700,color:"#3A3852",textTransform:"uppercase",letterSpacing:".05em",marginBottom:9,display:"flex",alignItems:"center",gap:5}}>
              <i className="ti ti-tag" style={{color:"#E0453E",fontSize:13}}/>Contract status
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>
              {ALL_ST.map(s=>{const on=stFilt.includes(s);const m=stL[s]||{l:s,bg:"#EEEEF4",c:"#6E6C84"};return(
                <button key={s} onClick={()=>toggleArr(stFilt,setStFilt,s)} style={{padding:"5px 10px",borderRadius:9,border:`1.5px solid ${on?m.c:"#E7E6F0"}`,background:on?m.bg:"#FAFAF9",color:on?m.c:"#3A3852",cursor:"pointer",fontSize:12,fontWeight:on?700:400}}>
                  {m.l}
                </button>
              );})}
            </div>
            <div style={{fontSize:10.5,fontWeight:700,color:"#3A3852",textTransform:"uppercase",letterSpacing:".05em",marginBottom:9,display:"flex",alignItems:"center",gap:5}}>
              <i className="ti ti-passport" style={{color:"#0E9F6E",fontSize:13}}/>Eligibility
            </div>
            {[[gbeOnly,setGbeOnly,"GBE eligible","#0E9F6E"],[euOnly,setEuOnly,"🇪🇺 EU passport","#2563C9"]].map(([on,set,l,c])=>(
              <div key={l} onClick={()=>set(v=>!v)} style={{display:"flex",alignItems:"center",gap:9,cursor:"pointer",padding:"6px 10px",borderRadius:9,border:`1.5px solid ${on?c:"#E7E6F0"}`,background:on?c+"18":"#FAFAF9",marginBottom:6}}>
                <div style={{width:34,height:19,borderRadius:10,background:on?c:"#D8D7E6",position:"relative",flexShrink:0,transition:"background .15s"}}>
                  <div style={{position:"absolute",top:2,left:on?16:2,width:15,height:15,borderRadius:"50%",background:"#fff",transition:"left .15s"}}/>
                </div>
                <span style={{fontSize:12,fontWeight:on?700:500,color:on?"#0C0B1E":"#3A3852"}}>{l}</span>
              </div>
            ))}
          </div>
        </div>
      </div>}
      {/* Quick-tab row */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {[["all","All players"],["mine","My portfolio"],["expiring","Expiring / Free"],["targets","Hot targets"]].map(([id,l])=>
          <button key={id} onClick={()=>setTab(id)} style={{display:"flex",alignItems:"center",gap:5,fontSize:11.5,padding:"5px 12px",borderRadius:20,border:`1px solid ${tab===id?B:"#D8D7E6"}`,background:tab===id?B:"#fff",color:tab===id?"#fff":"#3A3852",cursor:"pointer",fontWeight:500}}>
            {l}<span style={{background:tab===id?"rgba(255,255,255,.25)":"#EEEEF4",color:tab===id?"#fff":"#6E6C84",fontSize:10,fontWeight:700,padding:"0 5px",borderRadius:7}}>{PLAYERS.filter(p=>id==="all"?true:id==="mine"?p.mine:id==="expiring"?p.status==="expiring"||p.status==="free":p.status==="target").length}</span>
          </button>
        )}
      </div>
      {/* Table */}
      <div style={{background:"#fff",border:"1px solid #E7E6F0",borderRadius:14,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"32px 1.3fr 52px 82px 60px 56px 62px 70px",padding:"8px 14px",background:"#F6F5FE",fontSize:10,color:"#6E6C84",fontWeight:700,textTransform:"uppercase",letterSpacing:".04em"}}>
          <span/><span>Player</span><span>Pos</span><span>Club</span><span>Contract</span><span>Value</span><span>Age/Ht</span><span>Status</span>
        </div>
        {allP.length===0
          ?<div style={{padding:44,textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:8}}>🔍</div>
            <div style={{fontSize:13,fontWeight:600,color:"#3A3852",marginBottom:4}}>No players match your filters</div>
            <div style={{fontSize:11.5,color:"#A9A7BC",marginBottom:12}}>Try adjusting the value range, position or age</div>
            <button onClick={clearFilters} style={{padding:"7px 16px",borderRadius:9,background:B,color:"#EEEDFE",border:"none",cursor:"pointer",fontSize:12,fontWeight:600}}>Clear all filters</button>
          </div>
          :allP.map(p=>{const dc=dcC(p.days);const st=stL[p.status]||stL.locked;return(
            <div key={p.id} onClick={()=>setModal({type:"player",id:p.id})} style={{display:"grid",gridTemplateColumns:"32px 1.3fr 52px 82px 60px 56px 62px 70px",padding:"9px 14px",borderTop:"1px solid #E7E6F0",alignItems:"center",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#F6F5FE"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <Avatar p={p} size={26}/>
              <div style={{minWidth:0}}>
                <div style={{fontSize:12.5,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {p.name}
                  {p.mine&&<span style={{marginLeft:4,background:BLL,color:B,fontSize:9,fontWeight:700,padding:"0 5px",borderRadius:5}}>Mine</span>}
                  {p.euPassport&&<span style={{marginLeft:3,fontSize:9}} title="EU passport">🇪🇺</span>}
                </div>
                <div style={{fontSize:10,color:"#6E6C84",display:"flex",alignItems:"center",gap:4}}>
                  {p.nat}
                  {p.foot==="left"&&<span style={{fontSize:9,background:"#E3F5EE",color:"#06543A",padding:"0 4px",borderRadius:4}} title="Left-footed">L</span>}
                  {p.foot==="both"&&<span style={{fontSize:9,background:BLL,color:B,padding:"0 4px",borderRadius:4}} title="Two-footed">2</span>}
                  {(p.gbe==="auto"||p.gbe==="pass")&&<span style={{fontSize:9,background:"#E3F5EE",color:"#06543A",padding:"0 4px",borderRadius:4}}>GBE</span>}
                  {p.league&&<span style={{fontSize:9,background:"#EEEEF4",color:"#6E6C84",padding:"0 4px",borderRadius:4}}>{p.league}</span>}
                </div>
              </div>
              <Pill l={p.pos} bg={posC[p.pos]+"1a"} c={posC[p.pos]}/>
              <span style={{fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:3}}>{p.clubF} {p.club}</span>
              <Pill l={dc.l} bg={dc.bg} c={dc.c}/>
              <span style={{fontSize:12,fontWeight:600,color:B}}>€{p.vMid}m</span>
              <span style={{fontSize:11,color:"#6E6C84"}}>{p.age}y · {p.ht}cm</span>
              <Pill l={st.l} bg={st.bg} c={st.c}/>
            </div>
          );})}
      </div>
      <div style={{textAlign:"center",fontSize:11,color:"#A9A7BC",marginTop:8}}>Click a player for full profile · per-90 · percentile rankings · injury timeline</div>
    </div>;
  }

  /* ── AI MATCHES ── */
  function Matches(){
    return <div>
      <div style={{background:`linear-gradient(120deg,${BLL},#fff)`,border:`1px solid #E7E6F0`,borderRadius:14,padding:"14px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:18,flexWrap:"wrap"}}>
        <FitRing score={87} size={72}/>
        <div style={{flex:1,minWidth:220}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{t("fit_how")}</div>
          <div style={{fontSize:12,color:"#3A3852",lineHeight:1.6}}>{t("fit_exp")}</div>
          <div style={{display:"flex",gap:14,marginTop:10,flexWrap:"wrap"}}>
            {[[t("fit_style"),"40%",B],[t("fit_gap"),"25%","#2563C9"],[t("fit_budget"),"20%","#E8870C"],[t("fit_elig"),"15%","#0E9F6E"]].map(([l,pct,c])=>
              <div key={l} style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:9,height:9,borderRadius:3,background:c}}/><span style={{fontSize:11.5,color:"#3A3852"}}><b>{l}</b> {pct}</span></div>
            )}
          </div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:14,flexWrap:"wrap"}}>
        <span style={{fontSize:11.5,color:"#6E6C84",fontWeight:600}}>{t("showing_for")}</span>
        {NEEDS.map((n,i)=><button key={i} style={{fontSize:11,fontWeight:500,padding:"4px 10px",borderRadius:20,border:`1px solid ${fitClub===i?B:"#D8D7E6"}`,background:fitClub===i?B:"#fff",color:fitClub===i?"#fff":"#3A3852",cursor:"pointer"}} onClick={()=>setFitClub(i)}>{n.flag} {n.club} · {n.need}</button>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {fitMatches.map(({p,fit})=><div key={p.id} style={{background:"#fff",border:`1px solid ${fit.overall>=82?"#0E9F6E33":"#E7E6F0"}`,borderRadius:14,padding:"14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <FitRing score={fit.overall} size={56}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name} <span style={{fontSize:13}}>{p.flag}</span></div>
              <div style={{fontSize:11,color:"#6E6C84"}}>{p.pos} · {p.club} {p.clubF} · €{p.vMid}m</div>
              <div style={{display:"flex",gap:4,marginTop:5,flexWrap:"wrap"}}>
                <Pill l={p.pos} bg={posC[p.pos]+"1a"} c={posC[p.pos]}/>
                {p.gbe&&<Pill l="GBE" bg="#E3F5EE" c="#06543A" icon="ti-circle-check"/>}
                {p.status==="free"&&<Pill l={t("free_label")} bg="#E3F5EE" c="#06543A"/>}
                {p.status==="expiring"&&<Pill l={t("status_expiring")} bg="#FCEFD9" c="#6B3D03"/>}
              </div>
            </div>
          </div>
          <div style={{background:BLL,borderRadius:10,padding:"10px 12px",marginBottom:10}}>
            {[[t("col_style"),fit.style,B],[t("col_gap"),fit.gap,"#2563C9"],[t("col_budget"),fit.budget,"#E8870C"],[t("col_eligible_short"),fit.elig,"#0E9F6E"]].map(([l,v,c])=>
              <div key={l} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                <span style={{fontSize:10,width:52,fontWeight:500,color:"#3A3852",flexShrink:0}}>{l}</span>
                <Bar pct={v} color={c}/><span style={{fontSize:10,fontWeight:700,width:22,textAlign:"right",color:"#3A3852",flexShrink:0}}>{v}</span>
              </div>
            )}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",gap:6}}>
            <button style={{fontSize:11,padding:"5px 10px",borderRadius:8,border:"1px solid #D8D7E6",background:"#fff",cursor:"pointer"}} onClick={()=>setModal({type:"player",id:p.id})}>{t("btn_profile")}</button>
            <button style={{fontSize:11,padding:"5px 11px",borderRadius:8,background:B,color:"#EEEDFE",border:"none",cursor:"pointer"}} onClick={()=>setPage("deals")}>{t("btn_crm")}</button>
          </div>
        </div>)}
      </div>
    </div>;
  }

  /* ── TRIGGERS ── */
  function Triggers(){
    const trigCfg=[
      {cat:"Contracts & availability",icon:"ti-file-text",items:[{n:"Final contract year",freq:8,on:true},{n:"Becomes free agent",freq:3,on:true},{n:"Release clause activated",freq:2,on:true}]},
      {cat:"Club events",icon:"ti-building",items:[{n:"Manager change",freq:2,on:true},{n:"Relegation / promotion",freq:1,on:true},{n:"Injury creates a gap",freq:5,on:true}]},
      {cat:"Performance & value",icon:"ti-chart-line",items:[{n:"Minutes dropping",freq:6,on:true},{n:"Value swing ±15%",freq:4,on:true},{n:"Player in red-hot form",freq:3,on:true}]},
    ];
    return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
      <div>
        <div style={{fontSize:12,fontWeight:700,color:"#3A3852",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:"#26D07C"}}/>Live feed

  function DealModal(){
    const d=deals.find(x=>x.id===modal?.id); const p=d&&P(d.player); if(!d||!p) return null;
    const lc=d.likely>=70?"#0E9F6E":d.likely>=45?"#E8870C":"#E0453E";
    const pM={agent:{l:t("party_agent"),i:"ti-user-star",c:"#534AB7",cl:"#EEEDFE"},selling:{l:t("party_selling"),i:"ti-building-arrow-up",c:"#E8870C",cl:"#FCEFD9"},buying:{l:t("party_buying"),i:"ti-building-arrow-down",c:"#2563C9",cl:"#E4EDFB"},player:{l:t("party_player"),i:"ti-user",c:"#0E9F6E",cl:"#E3F5EE"}};
    const sM={done:{l:t("p_confirmed"),c:"#0E9F6E",bg:"#E3F5EE"},active:{l:t("p_active"),c:B,bg:BLL},pending:{l:t("p_pending"),c:"#6E6C84",bg:"#EEEEF4"}};
    const comm=d.fee>0?Math.round(d.fee*1000*(commPct/100)):Math.round((d.wage||60)*52*commPct/10/100);
    return <div style={{background:"#fff",borderRadius:18,width:520,maxWidth:"98%",maxHeight:"88vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
      <div style={{padding:"18px 20px",borderBottom:"1px solid #E7E6F0",display:"flex",alignItems:"center",gap:12}}>
        <Avatar p={p} size={44}/><div style={{flex:1}}><div style={{fontSize:15,fontWeight:700}}>{p.name} · {t("deal_room")}</div><div style={{fontSize:11.5,color:"#6E6C84"}}>{d.fromF} {d.from} → {d.toF} {d.to}</div></div>
        <button onClick={()=>setModal(null)} style={{width:28,height:28,borderRadius:"50%",background:"#EEEEF4",border:"none",cursor:"pointer",fontSize:14}}>✕</button>
      </div>
      <div style={{padding:"18px 20px"}}>
        {/* Stage progress */}
        <div style={{display:"flex",alignItems:"center",gap:3,marginBottom:16}}>
          {STAGE_KEYS.map((sk,i)=><div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{height:4,borderRadius:2,background:i<=d.stage?STAGE_C[d.stage]:"#EEEEF4",marginBottom:4}}/>
            <div style={{fontSize:8,color:i===d.stage?"#1a1a2e":"#A9A7BC",fontWeight:i===d.stage?700:400,whiteSpace:"nowrap"}}>{t(sk)}</div>
          </div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
          {[[t("fee_label"),d.fee>0?`€${d.fee}m`:t("free_label"),"#3A3852"],[t("wage_label"),`£${d.wage}K`,"#3A3852"],[t("likelihood"),`${d.likely}%`,lc,d.likely>=70?"#E3F5EE":d.likely>=45?"#FCEFD9":"#FCE9E8"]].map(([l,v,c,bg])=>
            <div key={l} style={{background:bg||"#F6F5FE",borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:9.5,color:"#6E6C84",marginBottom:3}}>{l}</div><div style={{fontSize:14,fontWeight:700,color:c}}>{v}</div></div>
          )}
        </div>
        <div style={{fontSize:11,fontWeight:700,color:"#3A3852",textTransform:"uppercase",letterSpacing:".04em",marginBottom:8}}>{t("parties_label")}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:14}}>
          {Object.entries(d.parties).map(([k,v])=>{const m=pM[k];const s=sM[v]||sM.pending;return m&&<div key={k} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px",border:"1px solid #E7E6F0",borderRadius:11}}>
            <div style={{width:30,height:30,borderRadius:8,background:m.cl,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><i className={`ti ${m.i}`} style={{fontSize:15,color:m.c}}/></div>
            <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600}}>{m.l}</div><div style={{fontSize:9.5,color:"#6E6C84"}}>{t("role_access")}</div></div>
            <Pill l={s.l} bg={s.bg} c={s.c}/>
          </div>;})}
        </div>
        {/* Commission calc */}
        <div style={{background:"#fff",border:"1px solid #E7E6F0",borderRadius:13,padding:"14px",marginBottom:14}}>
          <div style={{fontSize:11.5,fontWeight:700,marginBottom:10}}><i className="ti ti-calculator" style={{color:B,marginRight:5}}/>{t("comm_calc")}</div>
          <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
            {[["player",t("rep_player"),"3-5%"],["buying",t("rep_buying"),"3-5%"],["both",t("rep_dual"),"10%"],["selling",t("rep_selling"),"10%"]].map(([sc,l,cap])=>
              <button key={sc} style={{fontSize:10,padding:"4px 9px",borderRadius:9,border:`1px solid ${sc==="player"?"#D8D7E6":"#D8D7E6"}`,background:"#fff",cursor:"pointer",opacity:0.9}}>{l} <span style={{opacity:.6}}>{cap}</span></button>
            )}
          </div>
          <div style={{display:"flex",gap:5,marginBottom:10,alignItems:"center"}}>
            <span style={{fontSize:11,color:"#6E6C84"}}>{t("rate_label")}</span>
            {[3,4,5].map(p=><button key={p} onClick={()=>setCommPct(p)} style={{fontSize:10.5,padding:"3px 9px",borderRadius:9,border:`1px solid ${commPct===p?B:"#D8D7E6"}`,background:commPct===p?B:"#fff",color:commPct===p?"#fff":"#3A3852",cursor:"pointer"}}>{p}%</button>)}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#E3F5EE",borderRadius:9,padding:"10px 12px"}}>
            <span style={{fontSize:11,color:"#06543A"}}>{t("comm_on")} {d.fee>0?`€${d.fee}m`:t("wage_label")}</span>
            <span style={{fontSize:15,fontWeight:700,color:"#06543A"}}>{fmtK(comm)} <span style={{fontSize:10,fontWeight:400}}>{t("pretax")}</span></span>
          </div>
          <div style={{fontSize:9,color:"#A9A7BC",marginTop:7}}>{t("ffar_note")}</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {d.stage<6?<button style={{flex:1,padding:"11px",borderRadius:9,background:B,color:"#EEEDFE",border:"none",cursor:"pointer",fontWeight:600}} onClick={()=>{moveDeal(d.id,1);setModal(null);}}>{t("btn_advance")} →</button>
          :<button style={{flex:1,padding:"11px",borderRadius:9,background:"#0E9F6E",color:"#fff",border:"none",fontWeight:600}} disabled>{t("btn_signed")} ✓</button>}
          <button style={{padding:"11px 16px",borderRadius:9,border:"1px solid #D8D7E6",background:"#fff",cursor:"pointer"}} onClick={()=>setModal(null)}>{t("btn_close")}</button>
        </div>
      </div>
    </div>;
  }

  /* ── CARD WRAPPER ── */
  function Card({title,action,onAction,children}){
    return <div style={{background:"#fff",border:"1px solid #E7E6F0",borderRadius:14,overflow:"hidden"}}>
      <div style={{padding:"11px 16px",borderBottom:"1px solid #E7E6F0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:13.5,fontWeight:700,color:"#0C0B1E"}}>{title}</span>
        {action&&<button style={{fontSize:11.5,color:B,fontWeight:600,border:"none",background:"none",cursor:"pointer"}} onClick={onAction}>{action}</button>}
      </div>
      {children}
    </div>;
  }

  /* ── LANGUAGE PICKER ── */
  /* ── PAGE MAP ── */
  /* ──────────── SETTINGS — Notification Rules ──────────── */
  function Settings(){
    const ALL_POS=["GK","CB","FB","DM","CM","AM","W","ST"];
    const ALL_LG=["PL","BL","LL","SA","L1","NL","—"];
    const stL2={free:{l:"Free",bg:"#E3F5EE",c:"#06543A"},expiring:{l:"Expiring",bg:"#FCEFD9",c:"#6B3D03"},target:{l:"Target",bg:"#FCE9E8",c:"#7A1812"},locked:{l:"Locked",bg:"#EEEEF4",c:"#6E6C84"}};

    function ChSect(){
      return <div style={{background:"#fff",border:"1px solid #E7E6F0",borderRadius:14,padding:"16px 18px",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div>
            <div style={{fontSize:14,fontWeight:700}}>Notification channels</div>
            <div style={{fontSize:11.5,color:"#6E6C84",marginTop:2}}>Choose how you receive alerts from your rules</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
          {NOTIF_CHANNELS.map(ch=>{
            const on=ch.always||channels[ch.id];
            return <div key={ch.id} style={{border:`1.5px solid ${on?ch.color:"#E7E6F0"}`,borderRadius:12,padding:"12px 14px",background:on?ch.color+"0f":"#FAFAF9",cursor:ch.always?"default":"pointer",transition:"all .15s"}} onClick={()=>!ch.always&&setChannels(c=>({...c,[ch.id]:!c[ch.id]}))}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <div style={{width:32,height:32,borderRadius:9,background:ch.color+"22",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <i className={`ti ${ch.icon}`} style={{fontSize:17,color:ch.color}}/>
                </div>
                <div style={{width:34,height:19,borderRadius:10,background:on?ch.color:"#D8D7E6",position:"relative",flexShrink:0,transition:"background .15s"}}>
                  <div style={{position:"absolute",top:2,left:on?16:2,width:15,height:15,borderRadius:"50%",background:"#fff",transition:"left .15s"}}/>
                </div>
              </div>
              <div style={{fontSize:12.5,fontWeight:600,color:on?"#0C0B1E":"#6E6C84"}}>{ch.l}</div>
              {ch.always?<div style={{fontSize:10,color:"#A9A7BC",marginTop:2}}>Always on</div>
               :!ch.connected?<div style={{fontSize:10,color:ch.color,fontWeight:600,marginTop:2,cursor:"pointer"}}>Connect →</div>
               :<div style={{fontSize:10,color:on?"#0E9F6E":"#A9A7BC",marginTop:2}}>{on?"Active":"Paused"}</div>}
            </div>;
          })}
        </div>
        <div style={{background:"#F6F5FE",borderRadius:10,padding:"12px 14px",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
            <i className="ti ti-moon" style={{fontSize:15,color:"#3C3489"}}/>
            <span style={{fontSize:12.5,fontWeight:600}}>Quiet hours</span>
            <span style={{fontSize:11,color:"#6E6C84"}}>No alerts during</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input type="time" value={quietStart} onChange={e=>setQuietStart(e.target.value)} style={{padding:"5px 8px",border:"1.5px solid #D8D7E6",borderRadius:8,fontSize:12,background:"#fff"}}/>
            <span style={{fontSize:11,color:"#6E6C84"}}>to</span>
            <input type="time" value={quietEnd} onChange={e=>setQuietEnd(e.target.value)} style={{padding:"5px 8px",border:"1.5px solid #D8D7E6",borderRadius:8,fontSize:12,background:"#fff"}}/>
          </div>
          <span style={{fontSize:11,color:"#6E6C84"}}>Critical alerts always fire</span>
        </div>
      </div>;
    }

    function RuleCard({r}){
      const mc=computeRuleMatches(r.filt);
      const pm=PRIO_META[r.priority]||PRIO_META.medium;
      const ev=r.events.map(e=>TRIG_EVENTS.find(t=>t.code===e)).filter(Boolean);
      const fSummary=[
        r.filt.pos.length>0&&r.filt.pos.join(", "),
        (r.filt.vRange[0]>0||r.filt.vRange[1]<130)&&`€${r.filt.vRange[0]}–${r.filt.vRange[1]}m`,
        (r.filt.ageRange[0]>16||r.filt.ageRange[1]<35)&&`Age ${r.filt.ageRange[0]}–${r.filt.ageRange[1]}`,
        r.filt.foot!=="any"&&(r.filt.foot[0].toUpperCase()+r.filt.foot.slice(1))+" foot",
        r.filt.league!=="any"&&r.filt.league,
        r.filt.gbeOnly&&"GBE",r.filt.euOnly&&"EU passport",
        r.filt.status.length>0&&r.filt.status.map(s=>stL2[s]?.l||s).join("/"),
      ].filter(Boolean);
      return <div style={{background:"#fff",border:`1.5px solid ${r.active?"#E7E6F0":"#D8D7E6"}`,borderRadius:13,padding:"14px 16px",opacity:r.active?1:.7,transition:"all .15s",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:10}}>
          {/* Toggle */}
          <div onClick={()=>setNotifRules(rs=>rs.map(x=>x.id===r.id?{...x,active:!x.active}:x))} style={{width:38,height:22,borderRadius:11,background:r.active?"#3C3489":"#D8D7E6",position:"relative",cursor:"pointer",flexShrink:0,marginTop:2,transition:"background .2s"}}>
            <div style={{position:"absolute",top:3,left:r.active?18:3,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"left .2s"}}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4,flexWrap:"wrap"}}>
              <span style={{fontSize:14,fontWeight:700}}>{r.name}</span>
              <span style={{fontSize:9.5,fontWeight:700,padding:"2px 7px",borderRadius:6,background:pm.bg,color:pm.c,display:"flex",alignItems:"center",gap:3}}>
                <i className={`ti ${pm.icon}`} style={{fontSize:10}}/>{pm.l}
              </span>
              <span style={{fontSize:9.5,fontWeight:600,padding:"2px 7px",borderRadius:6,background:"#F6F5FE",color:"#3C3489",display:"flex",alignItems:"center",gap:3}}>
                <i className={`ti ${TIMING_META[r.timing]?.icon}`} style={{fontSize:10}}/>{TIMING_META[r.timing]?.l}
              </span>
            </div>
            {/* Filter summary */}
            {fSummary.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
              {fSummary.map((s,i)=><span key={i} style={{fontSize:10,background:"#F4F3F9",color:"#3A3852",padding:"2px 7px",borderRadius:6}}>{s}</span>)}
            </div>}
            {/* Events */}
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
              {ev.slice(0,5).map(e=><span key={e.code} style={{fontSize:10,display:"flex",alignItems:"center",gap:3,background:TC[e.cat]?.bg||"#EEEEF4",color:TC[e.cat]?.c||"#6E6C84",padding:"2px 7px",borderRadius:6}}>
                <i className={`ti ${e.icon}`} style={{fontSize:10}}/>{e.l}
              </span>)}
              {ev.length>5&&<span style={{fontSize:10,color:"#A9A7BC"}}>+{ev.length-5} more</span>}
            </div>
            {/* Channels + match count */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                {r.channels.map(cid=>{const ch=NOTIF_CHANNELS.find(c=>c.id===cid);return ch?<span key={cid} style={{display:"flex",alignItems:"center",gap:3,fontSize:10.5,fontWeight:600,padding:"2px 7px",borderRadius:7,background:ch.color+"18",color:ch.color}}><i className={`ti ${ch.icon}`} style={{fontSize:12}}/>{ch.l}</span>:null;})}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:11.5,fontWeight:700,color:mc>0?"#0E9F6E":"#A9A7BC",background:mc>0?"#E3F5EE":"#F4F3F9",padding:"3px 9px",borderRadius:7}}>
                  <i className="ti ti-users" style={{fontSize:11,marginRight:3}}/>{mc} player{mc!==1?"s":""} match
                </span>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:5,flexShrink:0}}>
            <button onClick={()=>openEditRule(r)} style={{width:30,height:30,borderRadius:8,border:"1px solid #E7E6F0",background:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <i className="ti ti-pencil" style={{fontSize:14,color:"#6E6C84"}}/>
            </button>
            <button onClick={()=>setNotifRules(rs=>rs.filter(x=>x.id!==r.id))} style={{width:30,height:30,borderRadius:8,border:"1px solid #FCE9E8",background:"#FCE9E8",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <i className="ti ti-trash" style={{fontSize:14,color:"#E0453E"}}/>
            </button>
          </div>
        </div>
      </div>;
    }

    return <div>
      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[[notifRules.filter(r=>r.active).length,"Active rules","ti-bell","#3C3489"],
          [notifRules.reduce((a,r)=>a+r.events.length,0),"Total triggers","ti-bolt","#E8870C"],
          [Object.values(channels).filter(Boolean).length,"Live channels","ti-send","#0E9F6E"],
          [notifRules.reduce((a,r)=>a+computeRuleMatches(r.filt),0),"Players monitored","ti-users","#2563C9"]
        ].map(([v,l,ic,c])=><div key={l} style={{background:"#fff",border:"1px solid #E7E6F0",borderRadius:12,padding:"13px 15px",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:c}}/>
          <div style={{fontSize:10.5,color:"#6E6C84",marginBottom:5,display:"flex",alignItems:"center",gap:4}}><i className={`ti ${ic}`} style={{fontSize:12,color:c}}/>{l}</div>
          <div style={{fontSize:22,fontWeight:700}}>{v}</div>
        </div>)}
      </div>

      {/* Channels */}
      <ChSect/>

      {/* Smart alert rules */}
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div>
            <div style={{fontSize:14,fontWeight:700}}>Smart alert rules</div>
            <div style={{fontSize:11.5,color:"#6E6C84",marginTop:2}}>Player-filter based rules — push alerts when events match your criteria</div>
          </div>
          <button onClick={openNewRule} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:10,background:"#3C3489",color:"#EEEDFE",border:"none",cursor:"pointer",fontWeight:600,fontSize:12.5}}>
            <i className="ti ti-plus" style={{fontSize:15}}/>New rule
          </button>
        </div>
        {notifRules.map(r=><RuleCard key={r.id} r={r}/>)}
        {notifRules.length===0&&<div style={{textAlign:"center",padding:"40px 20px",border:"2px dashed #E7E6F0",borderRadius:14,color:"#A9A7BC"}}>
          <i className="ti ti-bell-off" style={{fontSize:32,display:"block",marginBottom:10}}/>
          <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>No alert rules yet</div>
          <div style={{fontSize:11.5,marginBottom:14}}>Create your first rule to get notified when players match your criteria</div>
          <button onClick={openNewRule} style={{padding:"8px 16px",borderRadius:9,background:"#3C3489",color:"#EEEDFE",border:"none",cursor:"pointer",fontWeight:600}}>Create first rule</button>
        </div>}
      </div>

      {/* Rule editor panel */}
      {showRuleEd&&<div style={{position:"fixed",inset:0,background:"rgba(12,11,30,.45)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setShowRuleEd(false)}>
        <div style={{background:"#fff",borderRadius:18,width:760,maxWidth:"98%",maxHeight:"92vh",overflowY:"auto",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
          {/* Header */}
          <div style={{padding:"18px 22px",borderBottom:"1px solid #E7E6F0",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <div>
              <div style={{fontSize:16,fontWeight:700}}>{editRule?"Edit rule":"New alert rule"}</div>
              <div style={{fontSize:11.5,color:"#6E6C84",marginTop:2}}>Define which players and events trigger this alert</div>
            </div>
            <button onClick={()=>setShowRuleEd(false)} style={{width:30,height:30,borderRadius:"50%",background:"#EEEEF4",border:"none",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
          <div style={{padding:"20px 22px",flex:1,overflowY:"auto"}}>
            {/* Rule name */}
            <div style={{marginBottom:20}}>
              <label style={{fontSize:11,fontWeight:700,color:"#3A3852",textTransform:"uppercase",letterSpacing:".05em",display:"block",marginBottom:7}}>Rule name</label>
              <input value={rName} onChange={e=>setRName(e.target.value)} placeholder="e.g. CB Bosman watch, PL striker intel…" style={{width:"100%",padding:"10px 13px",border:"1.5px solid #D8D7E6",borderRadius:10,fontSize:13.5,outline:"none",fontFamily:"inherit"}}/>
            </div>
            <div style={{height:1,background:"#F1F0F8",margin:"0 -22px 20px"}}/>

            {/* PLAYER FILTER SECTION */}
            <div style={{marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
                  <i className="ti ti-filter" style={{color:"#3C3489",fontSize:15}}/>Player filter
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {computeRuleMatches(rFilt)>0
                    ?<span style={{fontSize:12,fontWeight:700,color:"#0E9F6E",background:"#E3F5EE",padding:"4px 10px",borderRadius:8,display:"flex",alignItems:"center",gap:4}}><i className="ti ti-users" style={{fontSize:13}}/>{computeRuleMatches(rFilt)} players match this filter</span>
                    :<span style={{fontSize:12,color:"#A9A7BC",background:"#F4F3F9",padding:"4px 10px",borderRadius:8}}>No players match yet</span>}
                </div>
              </div>
              {/* Filter rows */}
              <div style={{background:"#F9F8FE",border:"1px solid #E7E6F0",borderRadius:13,padding:"16px"}}>
                {/* Position */}
                <div style={{marginBottom:14}}>

  /* ──────────── LEGAL PAGES ──────────── */
  function Legal(){
    const tabs=[{id:"tc",l:"Terms & Conditions",icon:"ti-file-text"},{id:"privacy",l:"Privacy Policy",icon:"ti-shield-lock"},{id:"cookies",l:"Cookie Policy",icon:"ti-cookie"}];
    const md=LEGAL[showLegal||legalTab]||LEGAL.tc;
    // simple markdown → HTML renderer
    const html=md.trim()
      .replace(/^# (.+)$/gm,(_,t)=>`<h1 style="font-size:22px;font-weight:800;margin:0 0 6px;letter-spacing:-.02em;color:#0C0B1E">${t}</h1>`)
      .replace(/^## (.+)$/gm,(_,t)=>`<h2 style="font-size:15px;font-weight:700;margin:20px 0 8px;color:#0C0B1E;padding-bottom:6px;border-bottom:1px solid #E7E6F0">${t}</h2>`)
      .replace(/^\*\*(.+?)\*\*/gm,(_,t)=>`<strong>${t}</strong>`)
      .replace(/`(.+?)`/g,(_,t)=>`<code style="background:#F4F3F9;padding:1px 5px;border-radius:4px;font-size:.92em">${t}</code>`)
      .replace(/\| (.+) \|/g,(_,cells)=>`<tr>${cells.split(" | ").map(c=>`<td style="padding:7px 12px;border:1px solid #E7E6F0;font-size:12px">${c}</td>`).join("")}</tr>`)
      .replace(/(\n<tr>.*<\/tr>)+/gs,m=>`<table style="border-collapse:collapse;width:100%;margin:10px 0">${m}</table>`)
      .replace(/\n/g,"<br/>");
    return <div>
      {/* Tab bar */}
      <div style={{display:"flex",gap:6,marginBottom:18}}>
        {tabs.map(tab=><button key={tab.id} onClick={()=>setLegalTab(tab.id)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:10,border:`1.5px solid ${legalTab===tab.id?"#3C3489":"#D8D7E6"}`,background:legalTab===tab.id?"#EEEDFE":"#fff",color:legalTab===tab.id?"#3C3489":"#6E6C84",fontWeight:legalTab===tab.id?700:500,fontSize:12.5,cursor:"pointer"}}>
          <i className={`ti ${tab.icon}`} style={{fontSize:14}}/>{tab.l}
        </button>)}
      </div>
      <div style={{background:"#fff",border:"1px solid #E7E6F0",borderRadius:14,padding:"28px 32px",maxWidth:860,margin:"0 auto"}}>
        <div dangerouslySetInnerHTML={{__html:html}} style={{lineHeight:1.75,fontSize:13,color:"#3A3852"}}/>
        <div style={{marginTop:24,paddingTop:16,borderTop:"1px solid #E7E6F0",fontSize:11,color:"#A9A7BC",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <span>Transfer365 Ltd · 20 Moorgate, London EC2R 6DA · legal@transfer365.io</span>
          <span>Last updated: 15 June 2025</span>
        </div>
      </div>
    </div>;
  }

        </div>
      </div>

      {/* MAIN CONTENT */}
      <div style={{flex:1,overflowY:"auto",minWidth:0}}>
        <div style={{padding:"18px 22px 60px",maxWidth:1300,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            <h1 style={{fontSize:20,fontWeight:700,letterSpacing:"-.03em",margin:0}}>{t(`nav_${page}`)||t("nav_dash")}</h1>
            {page==="players"&&<span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:7,background:BLL,color:B}}>{PLAYERS.length} players</span>}
            {page==="deals"&&<span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:7,background:"#E3F5EE",color:"#06543A"}}>{fmtK(totalComm)} pipeline</span>}
          </div>
          <PageComp/>
        </div>
      </div>
    </div>

    {/* MODAL OVERLAY */}
    {modal&&<div style={{position:"fixed",inset:0,background:"rgba(12,11,30,.55)",backdropFilter:"blur(3px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setModal(null)}>
      {modal.type==="player"?<PlayerModal/>:modal.type==="deal"?<DealModal/>:null}
    </div>}

    {/* UPGRADE MODAL */}
    <UpgradeModal/>

    {/* LEGAL MODAL */}
    {showLegal&&<div style={{position:"fixed",inset:0,background:"rgba(12,11,30,.55)",backdropFilter:"blur(4px)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setShowLegal(null)}>
      <div style={{background:"#fff",borderRadius:18,width:860,maxWidth:"97%",maxHeight:"92vh",display:"flex",flexDirection:"column",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"14px 20px",borderBottom:"1px solid #E7E6F0",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{display:"flex",gap:6}}>
            {[{id:"tc",l:"Terms & Conditions"},{id:"privacy",l:"Privacy Policy"},{id:"cookies",l:"Cookie Policy"}].map(tab=>
              <button key={tab.id} onClick={()=>setShowLegal(tab.id)} style={{padding:"6px 14px",borderRadius:9,border:`1.5px solid ${showLegal===tab.id?"#3C3489":"#D8D7E6"}`,background:showLegal===tab.id?"#EEEDFE":"#fff",color:showLegal===tab.id?"#3C3489":"#6E6C84",fontWeight:showLegal===tab.id?700:500,fontSize:12,cursor:"pointer"}}>{tab.l}</button>
            )}
          </div>
          <button onClick={()=>setShowLegal(null)} style={{width:28,height:28,borderRadius:"50%",background:"#EEEEF4",border:"none",cursor:"pointer",fontSize:14}}>✕</button>
        </div>
        <div style={{overflowY:"auto",padding:"24px 32px",flex:1}} dangerouslySetInnerHTML={{__html:
          (LEGAL[showLegal]||LEGAL.tc).trim()
          .replace(/^# (.+)$/gm,(_,t)=>`<h1 style="font-size:21px;font-weight:800;margin:0 0 4px;color:#0C0B1E">${t}</h1>`)
          .replace(/^## (.+)$/gm,(_,t)=>`<h2 style="font-size:14px;font-weight:700;margin:18px 0 7px;color:#0C0B1E;padding-bottom:5px;border-bottom:1px solid #E7E6F0">${t}</h2>`)
          .replace(/\*\*(.+?)\*\*/g,(_,t)=>`<strong>${t}</strong>`)
          .replace(/`(.+?)`/g,(_,t)=>`<code style="background:#F4F3F9;padding:1px 5px;border-radius:4px;font-size:.9em">${t}</code>`)
          .replace(/\n/g,"<br/>")
          .replace(/\| (.+) \|/g,(_,cells)=>`<tr>${cells.split(" | ").map(c=>`<td style="padding:7px 11px;border:1px solid #E7E6F0;font-size:12px">${c}</td>`).join("")}</tr>`)
          .replace(/(<tr>.*?<\/tr>\s*){2,}/gs,m=>`<table style="border-collapse:collapse;width:100%;margin:10px 0">${m}</table>`)
        }} style={{lineHeight:1.8,fontSize:13,color:"#3A3852"}}/>
        <div style={{padding:"12px 32px",borderTop:"1px solid #E7E6F0",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,background:"#FAFAFA"}}>
          <span style={{fontSize:11,color:"#A9A7BC"}}>Transfer365 Ltd · 20 Moorgate, London EC2R 6DA · legal@transfer365.io</span>
          <button onClick={()=>setShowLegal(null)} style={{padding:"7px 16px",borderRadius:9,background:"#3C3489",color:"#EEEDFE",border:"none",cursor:"pointer",fontSize:12,fontWeight:600}}>Close</button>
        </div>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
